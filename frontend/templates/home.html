<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Welcome - Wow'Man</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            width: 100%;
            background: #122139;
            overflow: hidden;
            margin: 0;
            font-family: 'Roboto', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Rose Background */
        .rose-container {
            width: 100px;
            height: 300px;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            margin: auto;
            transform: scale(0.6);
            z-index: -1;
            opacity: 0.5;
        }

        .rose-container div {
            position: absolute;
        }

        .rose-container .glass {
            height: 420px;
            width: 250px;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 300px 300px 0px 0px;
            left: -80px;
            top: -100px;
            border-bottom: 15px solid rgba(255, 255, 255, 0.5);
        }

        .rose-container .glass:after {
            width: 8px;
            background: rgba(255, 255, 255, 0.28);
            content: '';
            position: absolute;
            height: 80px;
            border-radius: 100px;
            left: 10px;
            top: 180px;
        }

        .rose-container .glass:before {
            width: 8px;
            background: rgba(255, 255, 255, 0.28);
            content: '';
            position: absolute;
            height: 15px;
            border-radius: 100px;
            left: 10px;
            top: 280px;
        }

        .rose-container .glow {
            width: 170px;
            height: 170px;
            border-radius: 100%;
            border: 1px solid rgba(245, 148, 184, 0.47);
            box-shadow: 0px 0px 10px #f594b8;
            left: -40px;
            top: -40px;
            animation: glowing 2.5s ease-in-out infinite;
        }

        .rose-container .rose-petals>div {
            background: #d52d58;
            width: 45px;
            height: 80px;
            position: absolute;
            transition: all 0.5s ease-out;
        }

        .rose-container .rose-petals>div:nth-child(1) {
            border-radius: 15px;
            left: 20px;
            top: -6px;
            background: #d52d58;
        }

        .rose-container .rose-petals>div:nth-child(2),
        .rose-container .rose-petals>div:nth-child(4),
        .rose-container .rose-petals>div:nth-child(6) {
            border-radius: 0px 30px 0px 30px;
            background: #b81b43;
            left: 0;
            transform-origin: bottom right;
        }

        .rose-container .rose-petals>div:nth-child(3),
        .rose-container .rose-petals>div:nth-child(5),
        .rose-container .rose-petals>div:nth-child(7) {
            border-radius: 30px 0px 30px 0px;
            left: 40px;
            transform-origin: bottom left;
        }

        .rose-container .rose-petals>div:nth-child(2) {
            animation: openRose2 3s ease-in-out forwards;
            z-index: 5;
            background: #9e183a;
            top: 10px;
            height: 70px;
            animation-delay: 2s;
        }

        .rose-container .rose-petals>div:nth-child(3) {
            animation: openRose3 3s ease-in-out forwards;
            z-index: 4;
            background: #9e183a;
            top: 10px;
            height: 70px;
            animation-delay: 2s;
        }

        .rose-container .rose-petals>div:nth-child(4) {
            animation: openRose4 3s ease-in-out forwards;
            z-index: 3;
            background: #b81b43;
            top: 5px;
            height: 75px;
            animation-delay: 2s;
        }

        .rose-container .rose-petals>div:nth-child(5) {
            animation: openRose5 3s ease-in-out forwards;
            z-index: 2;
            background: #b81b43;
            top: 5px;
            height: 75px;
            animation-delay: 2s;
        }

        .rose-container .rose-petals>div:nth-child(6) {
            animation: openRose6 3s ease-in-out forwards;
            z-index: 1;
            background: #c9204b;
            animation-delay: 2s;
        }

        .rose-container .rose-petals>div:nth-child(7) {
            animation: openRose7 3s ease-in-out forwards;
            z-index: 0;
            background: #c9204b;
            animation-delay: 2s;
        }

        .rose-container .rose-leaves>div:nth-last-child(1) {
            width: 55px;
            height: 30px;
            background: #338f37;
            position: absolute;
            top: 60px;
            left: 15px;
            border-radius: 100px;
        }

        .rose-container .rose-leaves>div:nth-child(1) {
            width: 6px;
            height: 230px;
            border: none;
            top: 80px;
            background: #066406;
            left: 40px;
        }

        .rose-container .thorns>div {
            width: 30px;
            height: 30px;
            background: #066406;
            top: 100px;
            left: 10px;
        }

        .rose-container .thorns>div:after {
            width: 41px;
            height: 31px;
            border-radius: 100%;
            background: #122139;
            content: "";
            position: absolute;
            left: -12px;
            top: 17px;
        }

        .rose-container .thorns>div:before {
            width: 41px;
            height: 31px;
            border-radius: 100%;
            background: #122139;
            content: "";
            position: absolute;
            left: -11px;
            top: -11px;
            z-index: 0;
        }

        .rose-container .thorns>div:nth-child(2) {
            top: 150px;
            transform: rotate(180deg);
            left: 45px;
        }

        .rose-container .thorns>div:nth-child(3) {
            top: 180px;
        }

        .rose-container .thorns>div:nth-child(4) {
            top: 220px;
            transform: rotate(180deg);
            left: 45px;
        }

        .rose-container .sparkles {
            bottom: -40px;
        }

        .rose-container .sparkles>div {
            width: 4px;
            height: 4px;
            border-radius: 100px;
            background: #ff96c0;
            box-shadow: 0px 0px 12px 2px #ff4e85;
            bottom: 0;
            opacity: 0;
            animation: sparkle 4s ease-in-out infinite;
        }

        .rose-container .sparkles>div:nth-child(1) {
            left: 60px;
            animation-delay: 3s;
        }

        .rose-container .sparkles>div:nth-child(2) {
            left: 158px;
            animation-delay: 2s;
        }

        .rose-container .sparkles>div:nth-child(3) {
            left: -22px;
            animation-delay: 1s;
        }

        .rose-container .sparkles>div:nth-child(4) {
            left: 10px;
            animation-delay: 1s;
        }

        .rose-container .sparkles>div:nth-child(5) {
            left: 177px;
            animation-delay: 3s;
        }

        .rose-container .sparkles>div:nth-child(6) {
            left: -82px;
            animation-delay: 2s;
        }

        .rose-container .sparkles>div:nth-child(7) {
            left: 45px;
            animation-delay: 3s;
        }

        .rose-container .sparkles>div:nth-child(8) {
            left: 74px;
            animation-delay: 3s;
        }

        .rose-container .sparkles>div:nth-child(9) {
            left: -79px;
            animation-delay: 2s;
        }

        @keyframes sparkle {
            50% {
                opacity: 1;
            }

            100% {
                bottom: 250px;
            }
        }

        @keyframes openRose2 {
            50% {
                transform: rotate(-90deg);
                top: 80px;
                left: 100px;
            }

            100% {
                transform: rotate(-60deg);
                top: 210px;
                left: -30px;
            }
        }

        @keyframes openRose3 {
            100% {
                transform: rotate(60deg);
            }
        }

        @keyframes openRose4 {
            100% {
                transform: rotate(-30deg);
            }
        }

        @keyframes openRose5 {
            100% {
                transform: rotate(30deg);
            }
        }

        @keyframes glowing {
            50% {
                box-shadow: 0px 0px 60px #f594b8;
            }
        }

        /* Form UI */
        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 10px;
            z-index: 10;
            backdrop-filter: blur(5px);
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            color: #122139;
            background-color: #fc5;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #f22;
            color: #fff;
        }

        .email-input {
            padding: 15px;
            width: 80%;
            max-width: 300px;
            border: none;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="rose-container">
        <div class="glass"></div>
        <div class="thorns">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="glow"></div>
        <div class="rose-leaves">
            <div></div>
            <div></div>
        </div>
        <div class="rose-petals">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="sparkles">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>

    <div class="container">
        <h1>Welcome to Wow'Man Services</h1>
        <p>Please enter your email to proceed.</p>
        <form method="POST">
            <input type="email" name="email" class="email-input" placeholder="Your Email Address" required>
            <br>
            <button type="submit" class="btn">Client Entrance</button>
            <button type="submit" class="btn">Management (Admin)</button>
        </form>
    </div>
</body>

</html>
