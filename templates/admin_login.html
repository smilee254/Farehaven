<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - The Wow'Man Fare Haven Ltd.</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body class="admin-light-body">
    <div class="login-container">
        <div class="admin-card">
            <h2>Admin Security Portal</h2>
            <p>Access authorized for developer mwanglewis6@gmail.com only.</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" class="light-form">
                <div class="form-group">
                    <label>Developer Email Address</label>
                    <input type="email" name="email" required placeholder="adminemail@gmail.com">
                </div>
                <button type="submit" class="btn btn-teal">Authorize Access</button>
            </form>
            <div style="margin-top: 1.5rem; font-size: 0.9rem; color: #666;">
                <a href="/" style="text-decoration: none; color: var(--primary-teal);">Back to Site</a>
            </div>
        </div>
    </div>
</body>

</html>
