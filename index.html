<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wow'Man Fare Haven - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-wrapper" id="bg-wrapper">
        <div class="container" id="rose-container">
            <div class="glass"></div>
            <div class="thorns">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="glow"></div>
            <div class="rose-leaves">
                <div></div>
                <div></div>
            </div>
            <div class="rose-petals">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="sparkles">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="card glass-card">
            <h1 class="brand">Wow'Man Fare Haven</h1>
            
            <div class="copywriting">
                <p class="mission"><strong>Mission:</strong> Specialized Motivational Workshops for women through team building and seminars.</p>
                <p class="benefit">Focus on <em>"Synergy & Leadership Calibration."</em></p>
                <p class="trust">In collaboration with outsourced expert facilitators.</p>
            </div>

            <form id="registrationForm" class="registration-form">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Jane Doe">
                </div>
                
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" required placeholder="+1 234 567 8900">
                </div>
                
                <div class="form-group">
                    <label for="orgType">Organization Type</label>
                    <select id="orgType" name="orgType" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Corporate">Corporate</option>
                        <option value="Chama">Chama</option>
                        <option value="Institution">Institution</option>
                    </select>
                </div>

                <div class="pricing-note">
                    <small>Friendly charges varying by location, headcount, and transit.</small>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span>Register Now</span>
                </button>
            </form>
            <div id="formMessage" class="form-message"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
